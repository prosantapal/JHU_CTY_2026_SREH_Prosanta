<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelson-Morley Ether Wind Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #030305;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: white;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
<script>
// --- Constants & Globals ---
const WIDTH = 800;
const HEIGHT = 600;
const GROUND_Y = (HEIGHT * 2) / 3;

// Physics Constants (Exactly from Pygame)
const C_SPEED = 10;
const ETHER_WIND = 0.5;

let platformSpeed = 4; // Controlled by slider
let selectedRef = 2;   // 0 = Green Platform, 2 = Absolute Ground
let trailMode = false;
let freezeMode = false;
let frameByFrame = false;
let showBackground = true;

// Entities
let stars = [];
let photons = [];
let wavefronts = [];
let platform;

// State & UI
let timer = 0;
let groundOffset = 0;
let yellowArmed = true;
let buttons = [];
let slider;
let palette;

function setup() {
    createCanvas(WIDTH, HEIGHT);
    
    palette = {
        bg: color(5, 5, 12),
        stars: color(255),
        green: color(0, 255, 100),
        yellow: color(255, 220, 0),
        white: color(255),
        red: color(255, 50, 80),
        blue: color(50, 150, 255),
        purple: color(180, 50, 255),
        blackBtn: color(40, 40, 45),
        wave: color(173, 216, 230), // Light Blue Wavefront
        ground: color(30, 30, 40),
        ruler: color(100, 100, 120),
        uiBg: color(15, 20, 25, 220)
    };

    // Initialize Stars
    for (let i = 0; i < 40; i++) {
        stars.push({
            x: random(WIDTH), y: random(GROUND_Y),
            r: random(1, 3), twinkle: random(TWO_PI)
        });
    }

    // Initialize Platform
    platform = { x: 100, y: GROUND_Y - 20, w: 160, h: 20 };

    setupUI();
}

function setupUI() {
    let cbW = 780, cbH = 80;
    let cx = WIDTH / 2;
    let cy = HEIGHT - cbH / 2 - 10;

    buttons.panel = { x: (WIDTH - cbW)/2, y: HEIGHT - cbH - 10, w: cbW, h: cbH };

    let spc = 65;
    let bR = 20;

    // Slider
    slider = {
        x: cx - 350, y: cy + 15, w: 120, h: 6,
        min: 0, max: C_SPEED, val: platformSpeed, dragging: false
    };

    // Buttons Layout
    buttons.push({ id: 0, x: cx - 2*spc, y: cy, r: bR, c: palette.green, type: 'ref', label: "PLATFORM" });
    buttons.push({ id: 1, x: cx - 1*spc, y: cy, r: bR, c: palette.yellow, type: 'action', label: "SHOOT" });
    buttons.push({ id: 2, x: cx,         y: cy, r: bR, c: palette.white, type: 'ref', label: "GROUND" });
    buttons.push({ id: 3, x: cx + 1*spc, y: cy, r: bR, c: palette.red, type: 'trail', label: "TRAILS" });
    buttons.push({ id: 4, x: cx + 2*spc, y: cy, r: bR, c: palette.blue, type: 'pause', label: "STEP" });
    buttons.push({ id: 5, x: cx + 3*spc, y: cy, r: bR, c: palette.purple, type: 'play', label: "PLAY" });
    buttons.push({ id: 6, x: cx + 4*spc, y: cy, r: bR, c: palette.blackBtn, type: 'bg', label: "BG" });
}

// --- Native Glow Helper ---
function setGlow(clr, blurSize) {
    drawingContext.shadowBlur = blurSize;
    drawingContext.shadowColor = clr.toString();
}

function clearGlow() {
    drawingContext.shadowBlur = 0;
}

function mod(n, m) { return ((n % m) + m) % m; }

// --- Physics Classes ---
class Photon {
    constructor(x, y, dir) {
        this.x = x;
        this.y = y;
        // Ether wind math exactly from Pygame
        if (dir > 0) {
            this.vx = (C_SPEED - ETHER_WIND);
        } else {
            this.vx = -(C_SPEED + ETHER_WIND);
        }
    }
    update(refSpeed) {
        this.x += (this.vx - refSpeed);
    }
    draw() {
        setGlow(palette.yellow, 15);
        fill(palette.yellow);
        noStroke();
        circle(this.x, this.y, 14);
        clearGlow();
    }
}

class Wavefront {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 0;
        this.alpha = 200;
        this.active = true;
    }
    update(refSpeed) {
        this.r += C_SPEED;
        this.x -= (refSpeed + ETHER_WIND);
        this.alpha -= 1.5; // Fade out
        if (this.alpha <= 0) this.active = false;
    }
    draw() {
        noFill();
        stroke(173, 216, 230, this.alpha);
        strokeWeight(2);
        circle(this.x, this.y, this.r * 2);
    }
}

// --- Main Draw Loop ---
function draw() {
    let dt = deltaTime / 1000;
    
    // Calculate Reference Speed
    let refSpeed = 0;
    if (selectedRef === 0) refSpeed = platformSpeed;

    // --- PHYSICS UPDATES ---
    let shouldUpdate = !freezeMode || frameByFrame;

    if (shouldUpdate) {
        // Update Ground/Stars
        groundOffset -= refSpeed;
        stars.forEach(s => { s.x = mod(s.x - refSpeed, WIDTH); });

        // Update Platform
        platform.x += (platformSpeed - refSpeed);
        platform.x = mod(platform.x + platform.w, WIDTH * 2) - platform.w;

        // Update Photons
        for (let i = photons.length - 1; i >= 0; i--) {
            photons[i].update(refSpeed);
            if (photons[i].x < 0 || photons[i].x > WIDTH) photons.splice(i, 1);
        }

        // Update Wavefronts
        for (let i = wavefronts.length - 1; i >= 0; i--) {
            wavefronts[i].update(refSpeed);
            if (!wavefronts[i].active) wavefronts.splice(i, 1);
        }

        // Re-arm button
        if (photons.length === 0) yellowArmed = true;

        timer = (timer + dt) % 100;
        if (frameByFrame) frameByFrame = false;
    }

    // --- DRAWING ---
    if (!trailMode) {
        background(palette.bg);
    } else {
        noStroke();
        fill(5, 5, 12, 40); 
        rect(0, 0, WIDTH, HEIGHT);
    }

    if (showBackground) {
        // Draw Stars
        noStroke();
        stars.forEach(s => {
            let alpha = 150 + 105 * sin(frameCount * 0.05 + s.twinkle);
            fill(255, 255, 255, alpha);
            circle(s.x, s.y, s.r * 2);
        });

        // Draw Ground & Ruler
        fill(palette.ground);
        noStroke();
        rect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
        
        stroke(palette.ruler);
        strokeWeight(2);
        line(0, GROUND_Y + 20, WIDTH, GROUND_Y + 20);
        
        let pPerU = 16;
        let startTick = Math.floor(-groundOffset / pPerU) - 1;
        let endTick = Math.ceil((WIDTH - groundOffset) / pPerU) + 1;

        for (let i = startTick; i <= endTick; i++) {
            let x = groundOffset + i * pPerU;
            if (i % 10 === 0) {
                strokeWeight(2);
                line(x, GROUND_Y + 20, x, GROUND_Y + 40);
            } else {
                strokeWeight(1);
                line(x, GROUND_Y + 30, x, GROUND_Y + 40);
            }
        }
    }

    // Draw Ether Wind Indicator (Optional, faint visual enhancement)
    if (showBackground) {
        stroke(255, 255, 255, 20);
        strokeWeight(1);
        for(let i = 0; i < 5; i++) {
            let flowX = mod((frameCount * -ETHER_WIND * 2) + i*200, WIDTH);
            line(flowX, 100 + i*40, flowX - 40, 100 + i*40);
        }
    }

    // Draw Wavefronts
    wavefronts.forEach(w => w.draw());

    // Draw Platform
    push();
    translate(platform.x, platform.y);
    setGlow(palette.green, 20);
    fill(0, 150, 50, 200);
    stroke(palette.green);
    strokeWeight(2);
    rect(0, 0, platform.w, platform.h, 5);
    clearGlow();
    
    // Draw Stopwatch
    let secs = floor(timer);
    let tenths = floor((timer - secs) * 10);
    let timeStr = nf(secs, 2) + "." + tenths;
    fill(255);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(20);
    textStyle(BOLD);
    text(timeStr, platform.w/2, -20);
    pop();

    // Draw Photons
    photons.forEach(p => p.draw());

    drawConsole();
}

function drawConsole() {
    let cb = buttons.panel;
    
    fill(palette.uiBg);
    stroke(80);
    strokeWeight(1);
    rect(cb.x, cb.y, cb.w, cb.h, 12);

    // Labels & Texts
    fill(200);
    noStroke();
    textSize(11);
    textAlign(CENTER, CENTER);
    text("PLATFORM V: " + platformSpeed.toFixed(1), slider.x + slider.w/2, cb.y + 16);
    
    // Slider Track & Thumb
    stroke(100);
    strokeWeight(4);
    line(slider.x, slider.y + slider.h/2, slider.x + slider.w, slider.y + slider.h/2);
    
    let thumbX = map(slider.val, slider.min, slider.max, slider.x, slider.x + slider.w);
    setGlow(palette.green, 15);
    fill(palette.green);
    noStroke();
    rect(thumbX - 5, slider.y - 5, 10, 16, 3);
    clearGlow();

    // Buttons
    buttons.forEach(b => {
        let active = false;
        if (b.type === 'ref' && selectedRef === b.id) active = true;
        if (b.type === 'trail' && trailMode) active = true;
        if (b.type === 'pause' && freezeMode) active = true;
        if (b.type === 'play' && !freezeMode) active = true;
        if (b.type === 'bg' && !showBackground) active = true;
        if (b.type === 'action' && !yellowArmed) active = true; // Button "pressed" while photons exist

        push();
        translate(b.x, b.y);
        
        let c = active ? color(255) : b.c;
        if (b.type === 'bg' && active) c = color(100);
        
        if (active && b.type !== 'bg' && b.type !== 'action') setGlow(b.c, 20);
        if (b.type === 'action' && yellowArmed) setGlow(b.c, 15); // Glow when ready to shoot
        
        fill(c);
        if (b.type === 'bg') {
            stroke(255);
            strokeWeight(2);
        } else {
            noStroke();
        }
        
        if (b.type === 'pause') {
            rect(-6, -8, 4, 16);
            rect(2, -8, 4, 16);
        } else if (b.type === 'play') {
            triangle(-4, -9, 8, 0, -4, 9);
        } else {
            circle(0, 0, b.r * 2);
            if (b.type !== 'bg') {
                fill(0, 0, 0, 100);
                circle(0, 0, b.r); 
            }
        }
        
        if (active && b.type === 'ref') {
            noFill();
            stroke(255);
            strokeWeight(2);
            circle(0, 0, b.r * 2.5);
        }
        clearGlow();

        // Button Labels
        fill(200);
        noStroke();
        textSize(10);
        textStyle(NORMAL);
        text(b.label, 0, b.r + 15);

        pop();
    });
}

// --- Interactions ---
function mousePressed() {
    // Slider Drag Check
    let thumbX = map(slider.val, slider.min, slider.max, slider.x, slider.x + slider.w);
    if (mouseX >= slider.x && mouseX <= slider.x + slider.w && mouseY >= slider.y - 10 && mouseY <= slider.y + slider.h + 10) {
        slider.dragging = true;
        updateSlider(mouseX);
        return;
    }

    // Button Clicks
    buttons.forEach(b => {
        if (dist(mouseX, mouseY, b.x, b.y) <= b.r) {
            if (b.type === 'ref') selectedRef = b.id;
            else if (b.type === 'trail') trailMode = !trailMode;
            else if (b.type === 'pause') { freezeMode = true; frameByFrame = true; }
            else if (b.type === 'play') { freezeMode = false; frameByFrame = false; }
            else if (b.type === 'bg') showBackground = !showBackground;
            else if (b.type === 'action' && yellowArmed) {
                // Shoot Light
                let launchX = platform.x + platform.w / 2;
                let launchY = platform.y - 10;
                
                photons.push(new Photon(launchX, launchY, 1));  // Right
                photons.push(new Photon(launchX, launchY, -1)); // Left
                wavefronts.push(new Wavefront(launchX, launchY));
                
                yellowArmed = false;
            }
        }
    });
}

function mouseDragged() {
    if (slider.dragging) updateSlider(mouseX);
}

function mouseReleased() {
    slider.dragging = false;
}

function updateSlider(mx) {
    let constrainedX = constrain(mx, slider.x, slider.x + slider.w);
    let newVal = map(constrainedX, slider.x, slider.x + slider.w, slider.min, slider.max);
    platformSpeed = constrain(newVal, slider.min, slider.max);
    slider.val = platformSpeed; 
}
</script>
</body>
</html>

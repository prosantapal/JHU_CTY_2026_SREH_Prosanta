<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einstein's Train Thought Experiment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #030305;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: white;
            user-select: none;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
<script>
// --- Constants & Globals ---
const WIDTH = 800;
const HEIGHT = 600;
const GROUND_Y = (HEIGHT * 2) / 3;

// Physics Constants
const C_SPEED = 10; 
let platformSpeed = 4; 

// State Flags
let selectedRef = 0;   // 0 = Green Platform (Train), 2 = White Ground
let trailMode = false;
let freezeMode = false;
let frameByFrame = false;

// Entities
let stars = [];
let photons = [];
let wavefronts = [];
let platform;
let groundObserverX = WIDTH / 2;
let groundOffset = 0;

// Stopwatches
let timeGlobal = 0;
let stopwatchGroundX = 100;

// UI & Timing
let yellowArmed = true;
let buttons = [];
let slider;
let palette;
let trailGraphics;

function setup() {
    createCanvas(WIDTH, HEIGHT);
    trailGraphics = createGraphics(WIDTH, HEIGHT);
    
    palette = {
        bg: color(5, 5, 12),
        stars: color(255),
        green: color(0, 255, 100),
        yellow: color(255, 220, 0),
        white: color(255),
        red: color(255, 50, 80),
        blue: color(50, 150, 255),
        purple: color(180, 50, 255),
        wave: color(100, 100, 255, 150),
        ground: color(30, 30, 40),
        ruler: color(100, 100, 120),
        uiBg: color(15, 20, 25, 220)
    };

    // Initialize Stars
    for (let i = 0; i < 20; i++) {
        stars.push({
            x: random(WIDTH), y: random(GROUND_Y),
            r: random(2, 5)
        });
    }

    // Initialize Platform (Train)
    platform = { x: 100, y: GROUND_Y - 20, w: 200, h: 20 };

    setupUI();
}

function setupUI() {
    let cbW = 650, cbH = 110;
    let cx = WIDTH / 2;
    let panelY = HEIGHT - cbH - 10;

    buttons.panel = { x: cx - cbW/2, y: panelY, w: cbW, h: cbH };

    let btnY = panelY + 40; 
    let spc = 80;
    let bR = 18;

    // Buttons
    buttons.push({ id: 0, x: cx - 2.5*spc, y: btnY, r: bR, c: palette.green,  label: "PLATFORM" });
    buttons.push({ id: 1, x: cx - 1.5*spc, y: btnY, r: bR, c: palette.yellow, label: "SHOOT" });
    buttons.push({ id: 2, x: cx - 0.5*spc, y: btnY, r: bR, c: palette.white,  label: "GROUND" });
    buttons.push({ id: 3, x: cx + 0.5*spc, y: btnY, r: bR, c: palette.red,    label: "TRAILS" });
    buttons.push({ id: 4, x: cx + 1.5*spc, y: btnY, r: bR, c: palette.blue,   label: "STEP" });
    buttons.push({ id: 5, x: cx + 2.5*spc, y: btnY, r: bR, c: palette.purple, label: "PLAY" });

    // Slider
    let sldY = panelY + 85; 
    slider = {
        x: cx - 125, y: sldY, w: 250, h: 8,
        min: 0, max: C_SPEED, val: platformSpeed, dragging: false
    };
}

// --- Native Glow Helper ---
function setGlow(clr, blurSize, target = drawingContext) {
    target.shadowBlur = blurSize;
    target.shadowColor = clr.toString();
}

function clearGlow(target = drawingContext) {
    target.shadowBlur = 0;
}

function mod(n, m) { return ((n % m) + m) % m; }

function formatTime(t) {
    let secs = floor(t);
    let tenths = floor((t - secs) * 10);
    return nf(secs, 2) + "." + tenths;
}

// --- Main Draw Loop ---
function draw() {
    let dt = 1 / 60; // Fixed timestep

    let refSpeed = 0;
    if (selectedRef === 0) refSpeed = platformSpeed;

    // --- PHYSICS UPDATES ---
    let shouldUpdate = !freezeMode || frameByFrame;

    if (shouldUpdate) {
        timeGlobal = (timeGlobal + dt) % 100;

        // Ground/Star Movement
        if (refSpeed !== 0) {
            groundObserverX -= refSpeed;
            groundOffset += refSpeed;
            if (groundObserverX < 0) groundObserverX += WIDTH;
            if (groundObserverX > WIDTH) groundObserverX -= WIDTH;
            groundOffset = groundOffset % 160;
        }

        stars.forEach(s => { s.x += -refSpeed; });
        
        stopwatchGroundX -= refSpeed;
        if (stopwatchGroundX > WIDTH) stopwatchGroundX = 0;
        if (stopwatchGroundX < 0) stopwatchGroundX = WIDTH;

        // Platform Movement
        platform.x += (platformSpeed - refSpeed);

        // Update Photons
        for (let i = photons.length - 1; i >= 0; i--) {
            let p = photons[i];
            
            p.x += p.vx;
            
            // Delete if they reached the center or went off screen
            if ((p.vx > 0 && p.x >= p.targetX) || (p.vx < 0 && p.x <= p.targetX) || 
                p.x < 0 || p.x > WIDTH) {
                photons.splice(i, 1);
            }
        }

        // Update Wavefronts
        for (let i = wavefronts.length - 1; i >= 0; i--) {
            let w = wavefronts[i];
            w.r += C_SPEED;
            if (w.r > max(WIDTH, HEIGHT) * 1.5) wavefronts.splice(i, 1);
        }

        // Re-arm button
        if (photons.length === 0) {
            yellowArmed = true;
            buttons[1].active = false;
        }

        if (frameByFrame) frameByFrame = false;
    }

    // --- DRAWING ---
    if (!trailMode) {
        background(palette.bg);
        trailGraphics.clear();
    } else {
        trailGraphics.noStroke();
        trailGraphics.fill(0, 0, 0, 30); 
        trailGraphics.rect(0, 0, WIDTH, HEIGHT);
        image(trailGraphics, 0, 0);
    }

    let drawTarget = trailMode ? trailGraphics : window;

    // Draw Stars
    drawTarget.noStroke();
    stars.forEach(s => {
        drawTarget.fill(255);
        drawTarget.circle(mod(s.x, WIDTH), s.y, s.r * 2);
    });

    // Draw Ground & Ruler
    fill(palette.ground);
    noStroke();
    rect(0, GROUND_Y, WIDTH, HEIGHT - GROUND_Y);
    
    let rulerY = GROUND_Y + 20;
    let rulerHeight = 20;
    fill(palette.ruler);
    rect(0, rulerY, WIDTH, rulerHeight);

    stroke(255);
    let minorInc = 16;
    let majorInc = 160;

    for (let x = -groundOffset % majorInc; x < WIDTH; x += minorInc) {
        let drawX = x;
        if ((x + groundOffset) % majorInc === 0) {
            strokeWeight(2);
            line(drawX, rulerY, drawX, rulerY + rulerHeight);
        } else {
            strokeWeight(1);
            line(drawX, rulerY + rulerHeight/2, drawX, rulerY + rulerHeight);
        }
    }
    noStroke();

    // Draw Wavefronts
    noFill();
    strokeWeight(2);
    wavefronts.forEach(w => {
        stroke(100, 100, 255, 150);
        circle(w.ox, w.oy, w.r * 2);
    });

    // Draw Platform
    let pDrawX = mod(platform.x, WIDTH);
    setGlow(palette.green, 15);
    fill(0, 150, 50);
    stroke(palette.green);
    strokeWeight(2);
    rect(pDrawX, platform.y, platform.w, platform.h, 4);
    clearGlow();
    noStroke();

    // Draw Photons
    photons.forEach(p => {
        setGlow(palette.yellow, 15, drawTarget);
        drawTarget.fill(palette.yellow);
        drawTarget.noStroke();
        drawTarget.circle(p.x, p.y, 14);
        clearGlow(drawTarget);
    });

    // Observers
    drawObserver(pDrawX + platform.w / 2, platform.y - 15, color(100, 200, 255), "T"); // Train
    drawObserver(groundObserverX, GROUND_Y + 80, palette.red, "G"); // Ground

    // Stopwatches
    fill(255);
    noStroke();
    textAlign(CENTER, CENTER);
    textSize(16);
    textStyle(BOLD);
    
    let timeStr = formatTime(timeGlobal);
    // Green (Center Train)
    text(timeStr, pDrawX + platform.w / 2, platform.y - 60);
    // Left Train
    text(timeStr, pDrawX, platform.y - 30);
    // Right Train
    text(timeStr, pDrawX + platform.w, platform.y - 30);
    // Ground
    text(timeStr, stopwatchGroundX, GROUND_Y - 20);

    drawConsole();
}

function drawObserver(x, y, col, label) {
    push();
    fill(col);
    noStroke();
    setGlow(col, 10);
    
    rectMode(CENTER);
    rect(x, y, 16, 30, 4); // Body
    circle(x, y - 25, 18); // Head
    
    fill(255);
    clearGlow();
    textAlign(CENTER, CENTER);
    textSize(14);
    textStyle(BOLD);
    text(label, x, y - 24);
    pop();
}

function drawConsole() {
    let cb = buttons.panel;
    
    fill(palette.uiBg);
    stroke(60);
    strokeWeight(1);
    rect(cb.x, cb.y, cb.w, cb.h, 12);
    
    fill(200);
    noStroke();
    textSize(13);
    textAlign(CENTER, BOTTOM);
    text("Platform Velocity (v): " + slider.val.toFixed(1), WIDTH / 2, slider.y + 20);

    stroke(100);
    strokeWeight(6);
    line(slider.x, slider.y, slider.x + slider.w, slider.y);
    
    let thumbX = map(slider.val, slider.min, slider.max, slider.x, slider.x + slider.w);
    setGlow(palette.green, 10);
    fill(palette.green);
    noStroke();
    rect(thumbX - 5, slider.y - 8, 10, 16, 3);
    clearGlow();

    buttons.forEach(b => {
        let active = false;
        if (b.id === selectedRef && (b.id === 0 || b.id === 2)) active = true;
        if (b.id === 3 && trailMode) active = true;
        if (b.id === 4 && freezeMode) active = true;
        if (b.id === 5 && !freezeMode) active = true;
        if (b.id === 1 && !yellowArmed) active = true;

        push();
        translate(b.x, b.y);
        
        let c = active ? color(255) : b.c;
        if (active && b.id !== 1) setGlow(b.c, 20);
        if (b.id === 1 && yellowArmed) setGlow(b.c, 15);
        
        fill(c);
        noStroke();
        
        if (b.id === 4) { 
            rect(-6, -8, 4, 16); rect(2, -8, 4, 16);
        } else if (b.id === 5) { 
            triangle(-4, -9, 8, 0, -4, 9);
        } else {
            circle(0, 0, b.r * 2);
            fill(0, 0, 0, 100); circle(0, 0, b.r); 
        }
        
        if (active && (b.id === 0 || b.id === 2)) {
            noFill(); stroke(255); strokeWeight(2); circle(0, 0, b.r * 2.5);
        }
        clearGlow();

        fill(200); noStroke(); textSize(10); textStyle(NORMAL); textAlign(CENTER, TOP);
        text(b.label, 0, b.r + 5);
        pop();
    });
}

// --- Interactions ---
function mousePressed() {
    if (mouseX >= slider.x - 10 && mouseX <= slider.x + slider.w + 10 && mouseY >= slider.y - 15 && mouseY <= slider.y + 15) {
        slider.dragging = true;
        updateSlider(mouseX);
        return;
    }

    buttons.forEach(b => {
        if (dist(mouseX, mouseY, b.x, b.y) <= b.r) {
            if (b.id === 0 || b.id === 2) selectedRef = b.id; 
            else if (b.id === 3) trailMode = !trailMode;      
            else if (b.id === 4) { freezeMode = true; frameByFrame = true; } 
            else if (b.id === 5) { freezeMode = false; frameByFrame = false; } 
            else if (b.id === 1 && yellowArmed) { 
                // Double Lightning Strike Logic (Shoot from both ends of train)
                let tX = mod(platform.x, WIDTH);
                let tY = platform.y;
                let cX = tX + platform.w / 2;
                
                // Photons move relative to the Ground observer C in all frames!
                let vL = (selectedRef === 0) ? C_SPEED : C_SPEED - platformSpeed;
                let vR = (selectedRef === 0) ? -C_SPEED : -C_SPEED - platformSpeed;

                photons.push({ x: tX, y: tY - 10, vx: vL, targetX: cX }); // From Left
                photons.push({ x: tX + platform.w, y: tY - 10, vx: vR, targetX: cX }); // From Right
                
                wavefronts.push({ ox: tX, oy: tY - 10, r: 0 });
                wavefronts.push({ ox: tX + platform.w, oy: tY - 10, r: 0 });
                
                yellowArmed = false;
            }
        }
    });
}

function mouseDragged() { if (slider.dragging) updateSlider(mouseX); }
function mouseReleased() { slider.dragging = false; }
function updateSlider(mx) {
    let constrainedX = constrain(mx, slider.x, slider.x + slider.w);
    platformSpeed = map(constrainedX, slider.x, slider.x + slider.w, slider.min, slider.max);
    slider.val = platformSpeed; 
}
</script>
</body>
</html>

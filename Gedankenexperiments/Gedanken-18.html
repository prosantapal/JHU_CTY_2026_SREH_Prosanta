<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Accelerator: Classical vs Relativistic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin-top: 0; margin-bottom: 10px;}
        #ui-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: #1e1e1e;
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #333;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background-color: #00e5ff;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background-color: #00b8cc; }
        canvas {
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <h2>Cyclotron: Classical vs. Relativistic Orbit</h2>
    
    <div id="ui-container">
        <button id="startBtn">Inject Particles & Start</button>
        <button id="resetBtn" style="background-color: #555; color: white;">Reset</button>
    </div>

    <div id="canvas-container"></div>

<script>
    // --- AUDIO SYNTHESIZER ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playZap(energy, isRelativistic) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        
        osc.type = isRelativistic ? 'sawtooth' : 'square';
        
        let freq = 200 + (energy * 2);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1); 
        
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
    }

    // --- PHYSICS CONSTANTS ---
    const C = 10.0;     
    const M = 1.0;      
    const E0 = M * C * C; 
    const qB = 0.2;     
    const dK = 4.0;     
    const R_MAX = 200;  // INCREASED: Larger accelerators

    // --- STATE VARIABLES ---
    let isRunning = false;
    let pClass, pRel;
    let flashC = 0, flashR = 0;

    let startBtn, resetBtn;

    function setup() {
        // INCREASED CANVAS SIZE
        let canvas = createCanvas(1000, 600);
        canvas.parent('canvas-container');

        startBtn = document.getElementById('startBtn');
        resetBtn = document.getElementById('resetBtn');

        startBtn.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isRunning = !isRunning;
            startBtn.innerText = isRunning ? "Pause Accelerator" : "Resume Accelerator";
        });

        resetBtn.addEventListener('click', initParticles);

        initParticles();
    }

    function initParticles() {
        isRunning = false;
        startBtn.innerText = "Inject Particles & Start";

        let startK = 2.0; 

        // SHIFTED CENTERS DOWN AND APART
        pClass = createParticle(250, 350, startK, false);
        pRel = createParticle(750, 350, startK, true);
    }

    function createParticle(cx, cy, initialK, isRel) {
        let p = {
            cx: cx, cy: cy,
            x: cx, y: cy,
            K: initialK,
            theta: 0, 
            active: true,
            trail: [],
            isRel: isRel
        };
        recalculateParticle(p);
        
        p.y = cy - p.R; 
        p.x = cx - 0.1; 
        
        return p;
    }

    function recalculateParticle(p) {
        if (p.isRel) {
            p.E = E0 + p.K;
            p.momentum = Math.sqrt(p.E * p.E - E0 * E0) / C;
            p.v_mag = (p.momentum * C * C) / p.E;
            p.omega = (qB * C * C) / p.E; 
        } else {
            p.v_mag = Math.sqrt(2 * p.K / M);
            p.momentum = M * p.v_mag;
            p.omega = qB / M; 
        }
        p.R = p.momentum / qB;
    }

    function draw() {
        background(15, 15, 20);

        // WIDER HUD BACKGROUNDS (Moved safely to the top)
        fill(25, 25, 30); noStroke();
        rect(30, 20, 450, 90, 8);
        rect(520, 20, 450, 90, 8);

        drawDees(250, 350, flashC);
        drawDees(750, 350, flashR);

        if (flashC > 0) flashC -= 15;
        if (flashR > 0) flashR -= 15;

        if (isRunning) {
            updateParticle(pClass, false);
            updateParticle(pRel, true);
        }

        drawParticle(pClass, color(255, 82, 82));
        drawParticle(pRel, color(68, 138, 255));

        drawHUD();
    }

    function updateParticle(p, isRelativistic) {
        if (!p.active) return;

        let steps = 10;
        let dt = 0.1;

        for (let i = 0; i < steps; i++) {
            let oldX = p.x;

            p.theta += p.omega * dt;
            p.x += p.v_mag * Math.cos(p.theta) * dt;
            p.y += p.v_mag * Math.sin(p.theta) * dt;

            if ((oldX - p.cx) * (p.x - p.cx) <= 0) {
                p.K += dK;
                recalculateParticle(p);
                
                if (p.isRel) {
                    flashR = 255;
                    playZap(p.K, true);
                } else {
                    flashC = 255;
                    playZap(p.K, false);
                }
            }

            if (p.R >= R_MAX - 2) {
                p.active = false;
                break;
            }
        }

        if (frameCount % 2 === 0 && p.active) {
            p.trail.push({x: p.x, y: p.y});
            if (p.trail.length > 300) p.trail.shift(); 
        }
    }

    function drawDees(cx, cy, flashAlpha) {
        push();
        stroke(100);
        strokeWeight(4);
        noFill();
        
        let gap = 10;
        let r = R_MAX * 2;

        arc(cx - gap/2, cy, r, r, HALF_PI, -HALF_PI);
        line(cx - gap/2, cy - r/2, cx - gap/2, cy + r/2);

        arc(cx + gap/2, cy, r, r, -HALF_PI, HALF_PI);
        line(cx + gap/2, cy - r/2, cx + gap/2, cy + r/2);

        if (flashAlpha > 0) {
            stroke(255, 255, 100, flashAlpha);
            strokeWeight(gap);
            line(cx, cy - r/2, cx, cy + r/2);
        }
        pop();
    }

    function drawParticle(p, c) {
        noFill();
        stroke(c.levels[0], c.levels[1], c.levels[2], 150);
        strokeWeight(2);
        beginShape();
        for (let pt of p.trail) vertex(pt.x, pt.y);
        endShape();

        if (p.active) {
            fill(c);
            noStroke();
            ellipse(p.x, p.y, 8);
        } else {
            fill(255, 100, 100);
            noStroke();
            ellipse(p.x, p.y, 25 + sin(frameCount)*5); 
        }
    }

    function drawHUD() {
        fill(255); noStroke(); textAlign(LEFT, TOP);

        // Classical HUD
        textSize(18); fill(255, 82, 82);
        text("Classical Orbit (Constant Frequency)", 45, 30);
        textSize(15); fill(200);
        text(`Velocity: ${(pClass.v_mag / C * 100).toFixed(1)}% c`, 45, 60);
        text(`Orbital Freq (ω): ${pClass.omega.toFixed(3)} rad/t`, 260, 60);
        text(`Radius: ${pClass.R.toFixed(0)} px`, 45, 85);
        text(`Momentum (p): ${pClass.momentum.toFixed(1)}`, 260, 85);
        if(!pClass.active) { fill(255,0,0); text("CRASHED!", 180, 85); }

        // Relativistic HUD
        textSize(18); fill(68, 138, 255);
        text("Relativistic Orbit (Sluggish Frequency)", 535, 30);
        textSize(15); fill(200);
        text(`Velocity: ${(pRel.v_mag / C * 100).toFixed(1)}% c`, 535, 60);
        
        if (pRel.omega < 0.19) fill(255, 255, 100);
        text(`Orbital Freq (ω): ${pRel.omega.toFixed(3)} rad/t`, 750, 60);
        
        fill(200);
        text(`Radius: ${pRel.R.toFixed(0)} px`, 535, 85);
        text(`Momentum (p): ${pRel.momentum.toFixed(1)}`, 750, 85);
        if(!pRel.active) { fill(255,0,0); text("CRASHED!", 670, 85); }
    }
</script>
</body>
</html>

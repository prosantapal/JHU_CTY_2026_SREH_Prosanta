<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galilean Reference Frames Simulator</title>
    <!-- Import p5.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #030305;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
<script>
// Screen dimensions
const WIDTH = 800;
const HEIGHT = 600;

// Entities
let stars = [];
let sprites = [];

// App State
let trailMode = false;
let selectedSprite = -1; // -1 means absolute frame / stars frozen
let freezeStars = true;

let palette;
let buttons = [];

function setup() {
    createCanvas(WIDTH, HEIGHT);
    
    palette = {
        bg: color(5, 5, 12),
        stars: color(255),
        green: color(50, 255, 100),
        blue: color(50, 150, 255),
        yellow: color(255, 220, 50),
        red: color(255, 50, 80),
        console: color(20, 20, 25, 200)
    };

    // Initialize Stars
    for(let i = 0; i < 60; i++) {
        stars.push({
            x: random(WIDTH), 
            y: random(HEIGHT),
            r: random(1, 3),
            twinkle: random(TWO_PI)
        });
    }

    // Initialize Moving Sprites
    sprites.push({ id: 0, x: 100, y: HEIGHT/2 + 100, vx: 1, vy: 0, color: palette.green, r: 12 });
    sprites.push({ id: 1, x: WIDTH/2 + 150, y: HEIGHT - 100, vx: 0, vy: -4, color: palette.blue, r: 12 });
    sprites.push({ id: 2, x: WIDTH/2, y: HEIGHT/2, angle: 0, vx: 0, vy: 0, color: palette.yellow, r: 12 });

    // Setup UI Console & Buttons
    let bW = 80, bH = 40, tS = 40, pad = 20, spc = 15;
    let totalW = (bW * 4) + tS + (spc * 4);
    let cX = (WIDTH - totalW) / 2;
    let cY = HEIGHT - bH - pad * 2 - 15;

    buttons.push({ x: cX + pad, y: cY + pad, w: bW, h: bH, c: palette.green, action: 0 });
    buttons.push({ x: cX + pad + bW + spc, y: cY + pad, w: bW, h: bH, c: palette.blue, action: 1 });
    buttons.push({ x: cX + pad + 2*(bW + spc), y: cY + pad, w: bW, h: bH, c: palette.yellow, action: 2 });
    buttons.push({ x: cX + pad + 3*(bW + spc), y: cY + pad, w: bW, h: bH, c: palette.stars, action: 3 });
    buttons.push({ x: cX + pad + 4*(bW + spc), y: cY + pad, w: tS, h: tS, c: palette.red, shape: 'triangle', action: 4 });
    
    background(palette.bg);
}

// Native Canvas Glow Helper
function setGlow(clr, blurSize) {
    drawingContext.shadowBlur = blurSize;
    drawingContext.shadowColor = clr.toString();
}
function clearGlow() {
    drawingContext.shadowBlur = 0;
}

function draw() {
    // Render Background / Trails
    if (!trailMode) {
        background(palette.bg);
    } else {
        noStroke();
        fill(5, 5, 12, 15); // Translucent fade effect
        rect(0, 0, WIDTH, HEIGHT);
    }

    // Update Yellow's circular velocity
    let yellow = sprites[2];
    yellow.angle += 0.02;
    yellow.vx = -100 * sin(yellow.angle) * 0.02;
    yellow.vy = 100 * cos(yellow.angle) * 0.02;

    // Determine the current reference frame velocity
    let refVx = 0;
    let refVy = 0;
    if (selectedSprite !== -1) {
        refVx = sprites[selectedSprite].vx;
        refVy = sprites[selectedSprite].vy;
    }

    // Draw & Update Stars
    noStroke();
    stars.forEach(s => {
        if (!freezeStars || selectedSprite !== -1) {
            // Stars move in the opposite direction of the reference frame
            s.x -= refVx;
            s.y -= refVy;
            
            // Screen wrap
            if (s.x > WIDTH) s.x -= WIDTH;
            if (s.x < 0) s.x += WIDTH;
            if (s.y > HEIGHT) s.y -= HEIGHT;
            if (s.y < 0) s.y += HEIGHT;
        }
        
        let alpha = 150 + 105 * sin(frameCount * 0.05 + s.twinkle);
        fill(255, 255, 255, alpha);
        circle(s.x, s.y, s.r * 2);
    });

    // Draw & Update Sprites (Galilean Transform)
    sprites.forEach(sp => {
        // Subtraction of velocity vectors
        sp.x += (sp.vx - refVx);
        sp.y += (sp.vy - refVy);

        // Screen Wrap
        if (sp.x > WIDTH + sp.r) sp.x = -sp.r;
        if (sp.x < -sp.r) sp.x = WIDTH + sp.r;
        if (sp.y > HEIGHT + sp.r) sp.y = -sp.r;
        if (sp.y < -sp.r) sp.y = HEIGHT + sp.r;

        // Draw with Neon Glow
        push();
        translate(sp.x, sp.y);
        setGlow(sp.color, 25);
        fill(sp.color);
        noStroke();
        circle(0, 0, sp.r * 2);
        
        // Inner bright core
        fill(255, 255, 255, 200);
        circle(0, 0, sp.r * 1);
        clearGlow();
        pop();
    });

    // Draw UI Console Overlay
    drawConsole();
}

function drawConsole() {
    let bW = 80, bH = 40, tS = 40, pad = 20, spc = 15;
    let totalW = (bW * 4) + tS + (spc * 4);
    let cX = (WIDTH - totalW) / 2;
    let cY = HEIGHT - bH - pad * 2 - 15;

    // Glass panel
    fill(palette.console);
    stroke(80, 80, 90);
    strokeWeight(1);
    rect(cX, cY, totalW + pad * 2, bH + pad * 2, 10);

    // Buttons
    buttons.forEach(b => {
        let active = false;
        if (b.action === 4) active = trailMode;
        else if (b.action === 3) active = (selectedSprite === -1);
        else if (b.action === selectedSprite) active = true;

        if (active) setGlow(b.c, 20);
        
        fill(b.c);
        noStroke();
        
        if (b.shape === 'triangle') {
            triangle(b.x, b.y + b.h, b.x + b.w, b.y + b.h, b.x + b.w / 2, b.y);
        } else {
            rect(b.x, b.y, b.w, b.h, 6);
        }
        clearGlow();
        
        // Active Outline
        if (active) {
            noFill();
            stroke(255);
            strokeWeight(3);
            if (b.shape === 'triangle') {
                triangle(b.x - 2, b.y + b.h + 2, b.x + b.w + 2, b.y + b.h + 2, b.x + b.w / 2, b.y - 2);
            } else {
                rect(b.x - 3, b.y - 3, b.w + 6, b.h + 6, 8);
            }
        }
    });
}

function mousePressed() {
    buttons.forEach(b => {
        // Check bounding box collisions
        let clicked = false;
        if (b.shape === 'triangle') {
            clicked = mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
        } else {
            clicked = mouseX >= b.x && mouseX <= b.x + b.w && mouseY >= b.y && mouseY <= b.y + b.h;
        }

        if (clicked) {
            if (b.action === 4) {
                trailMode = !trailMode;
            } else if (b.action === 3) {
                selectedSprite = -1;
                freezeStars = true;
            } else {
                selectedSprite = b.action;
                freezeStars = false;
            }
        }
    });
}
</script>
</body>
</html>

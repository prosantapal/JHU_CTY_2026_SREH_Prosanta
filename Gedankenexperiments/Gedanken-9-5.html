<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorentz Force Law</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #030305;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }
        canvas {
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
<script>
// --- Constants & Globals ---
const WIDTH = 800;
const HEIGHT = 600;

// Magnet (B-Field) Parameters
const MAG_X = 50;
const MAG_Y = 50;
const MAG_W = 600;
const MAG_H = 450;
const B_FIELD = 0.1; // Magnetic field strength

// Gun Parameters
const GUN_X = 720;
const GUN_Y = 300;
const GUN_W = 60;
const GUN_H = 20;

// Physics Parameters
const PROTON = 1;
const ELECTRON = -1;

let particles = [];
let pType = PROTON;
let pSpeed = 5; // Initial speed multiplier
const MAX_SPEED = 10;

let palette;

function setup() {
    createCanvas(WIDTH, HEIGHT);
    
    palette = {
        bg: color(5, 8, 15),
        magField: color(10, 25, 50, 150),
        magBorder: color(50, 150, 255),
        magMarks: color(50, 150, 255, 60),
        proton: color(255, 50, 80),   // Neon Pink/Red
        electron: color(50, 200, 255), // Neon Cyan
        gunBase: color(40, 45, 50),
        gunBarrel: color(80, 85, 90),
        white: color(255),
        uiBg: color(15, 20, 25, 220)
    };
}

// --- Native Glow Helper ---
function setGlow(clr, blurSize) {
    drawingContext.shadowBlur = blurSize;
    drawingContext.shadowColor = clr.toString();
}

function clearGlow() {
    drawingContext.shadowBlur = 0;
}

// --- Particle Class ---
class Particle {
    constructor(x, y, vx, vy, charge) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.charge = charge;
        this.trail = [];
        this.maxTrailLength = 150; // Slightly longer for smoother web visuals
        this.active = true;
    }

    update() {
        if (!this.active) return;

        // Check if inside Magnetic Field
        if (this.x > MAG_X && this.x < MAG_X + MAG_W &&
            this.y > MAG_Y && this.y < MAG_Y + MAG_H) {
            
            // Lorentz Force: F = q(v x B)
            // Assuming B points INTO screen (-z), v is in xy plane
            let fx = this.charge * this.vy * B_FIELD;
            let fy = -this.charge * this.vx * B_FIELD;

            // Simplified F = ma (mass = 1)
            this.vx += fx * 0.1;
            this.vy += fy * 0.1;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Add to trail
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > this.maxTrailLength) {
            this.trail.shift();
        }

        // Off-screen check
        if (this.x < -50 || this.x > WIDTH + 50 || this.y < -50 || this.y > HEIGHT + 50) {
            this.active = false;
        }
    }

    draw() {
        if (!this.active && this.trail.length === 0) return;

        let col = this.charge === PROTON ? palette.proton : palette.electron;
        let symbol = this.charge === PROTON ? "+" : "-";

        // Draw Trail
        if (this.trail.length > 1) {
            noFill();
            setGlow(col, 15);
            beginShape();
            for (let i = 0; i < this.trail.length; i++) {
                let pt = this.trail[i];
                let alpha = map(i, 0, this.trail.length, 0, 255);
                stroke(red(col), green(col), blue(col), alpha);
                strokeWeight(3);
                vertex(pt.x, pt.y);
            }
            endShape();
            clearGlow();
        }

        // Draw Particle Head
        if (this.active) {
            setGlow(col, 20);
            fill(col);
            noStroke();
            circle(this.x, this.y, 14);
            
            fill(255);
            clearGlow();
            textAlign(CENTER, CENTER);
            textSize(14);
            textStyle(BOLD);
            text(symbol, this.x, this.y - 1);
        }
    }
}

function shootParticle() {
    let speedFactor = pSpeed * 2;
    let vx = -speedFactor;
    let vy = 0;
    particles.push(new Particle(GUN_X - 30, GUN_Y, vx, vy, pType));
}

// --- Drawing Functions ---
function draw() {
    background(palette.bg);

    drawMagnetField();
    drawGun();

    // Update and Draw Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        
        // Clean up inactive particles with no trail left
        if (!p.active && p.trail.length === 0) {
            particles.splice(i, 1);
        }
    }

    drawUI();
}

function drawMagnetField() {
    // Field Background
    fill(palette.magField);
    stroke(palette.magBorder);
    strokeWeight(2);
    setGlow(palette.magBorder, 15);
    rect(MAG_X, MAG_Y, MAG_W, MAG_H, 8);
    clearGlow();

    // The 'N' Label
    fill(255, 255, 255, 100);
    noStroke();
    textSize(80);
    textStyle(BOLD);
    textAlign(CENTER, CENTER);
    text("N", MAG_X + MAG_W / 2, MAG_Y + MAG_H / 2);

    // Vector 'X' Marks (Indicating field pointing INTO screen)
    stroke(palette.magMarks);
    strokeWeight(2);
    let cols = 6;
    let rows = 4;
    for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
            let x = MAG_X + 50 + i * (MAG_W - 100) / (cols - 1);
            let y = MAG_Y + 50 + j * (MAG_H - 100) / (rows - 1);
            
            // Draw an X
            let size = 6;
            line(x - size, y - size, x + size, y + size);
            line(x - size, y + size, x + size, y - size);
        }
    }
}

function drawGun() {
    push();
    translate(GUN_X, GUN_Y);
    
    // Barrel
    fill(palette.gunBarrel);
    stroke(20);
    strokeWeight(2);
    rect(-GUN_W/2 - 20, -6, 30, 12, 3);
    
    // Body
    fill(palette.gunBase);
    rect(-GUN_W/2, -GUN_H/2, GUN_W, GUN_H, 4);

    // Details
    fill(255, 50, 50);
    noStroke();
    circle(0, 0, 6);
    
    pop();
}

function drawUI() {
    // Console Box
    fill(palette.uiBg);
    stroke(80);
    strokeWeight(1);
    rect(20, HEIGHT - 130, 320, 110, 8);

    fill(palette.white);
    noStroke();
    textAlign(LEFT, TOP);
    textSize(14);
    textStyle(BOLD);
    text("LORENTZ FORCE LAW", 35, HEIGHT - 115);
    
    textStyle(NORMAL);
    textSize(12);
    fill(180, 180, 200);
    text("[SPACE] Fire Particle", 35, HEIGHT - 90);
    text("[ P ]   Toggle Particle Type", 35, HEIGHT - 70);
    text("[↑] [↓] Adjust Launch Speed", 35, HEIGHT - 50);
    text("[ C ]   Clear Screen", 35, HEIGHT - 30);

    // Status Panel
    let pName = pType === PROTON ? "PROTON (+)" : "ELECTRON (-)";
    let pCol = pType === PROTON ? palette.proton : palette.electron;
    
    textAlign(RIGHT, TOP);
    fill(pCol);
    textStyle(BOLD);
    text(`TYPE: ${pName}`, 320, HEIGHT - 90);
    
    fill(palette.white);
    text(`SPEED: ${pSpeed} / ${MAX_SPEED}`, 320, HEIGHT - 70);

    // Speed Bar
    let barW = 120;
    let barH = 10;
    let barX = 320 - barW;
    let barY = HEIGHT - 45;
    
    fill(50);
    rect(barX, barY, barW, barH, 5);
    
    fill(palette.white);
    setGlow(palette.white, 10);
    let fillW = map(pSpeed, 1, MAX_SPEED, 0, barW);
    rect(barX, barY, fillW, barH, 5);
    clearGlow();
}

// --- Interactions ---
function keyPressed() {
    if (key === ' ') {
        shootParticle();
    } else if (key.toLowerCase() === 'p') {
        pType = pType === PROTON ? ELECTRON : PROTON;
    } else if (keyCode === UP_ARROW) {
        pSpeed = min(MAX_SPEED, pSpeed + 1);
    } else if (keyCode === DOWN_ARROW) {
        pSpeed = max(1, pSpeed - 1);
    } else if (key.toLowerCase() === 'c') {
        particles = [];
    }
}
</script>
</body>
</html>

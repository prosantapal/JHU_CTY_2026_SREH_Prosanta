<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constant Force Race</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { margin-top: 0; }
        #ui-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            background: #1e1e1e;
            padding: 15px 30px;
            border-radius: 8px;
            border: 1px solid #333;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            background-color: #00e5ff;
            color: black;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover { background-color: #00b8cc; }
        canvas {
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }
        .legend span { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; display: inline-block; border-radius: 3px; }
    </style>
</head>
<body>

    <h2>The Constant Force Race</h2>
    
    <div id="ui-container">
        <div class="control-group">
            <label for="forceSlider">Engine Thrust (Force): <span id="forceDisplay">1.0</span></label>
            <input type="range" id="forceSlider" min="0.1" max="5.0" value="1.0" step="0.1">
        </div>
        <div class="control-group" style="flex-direction: row; gap: 10px;">
            <button id="startBtn">Start Engine</button>
            <button id="resetBtn" style="background-color: #555; color: white;">Reset</button>
        </div>
    </div>

    <div id="canvas-container"></div>
    
    <div class="legend">
        <span><div class="box" style="background: #ff5252;"></div> Classical Ship (Newton)</span>
        <span><div class="box" style="background: #448aff;"></div> Relativistic Ship (Einstein)</span>
    </div>

<script>
    // --- PHYSICS CONSTANTS (Normalized Units) ---
    const C = 1.0;  // Speed of light is 1.0
    const M = 1.0;  // Mass is 1.0

    // --- STATE VARIABLES ---
    let t = 0;
    let dt = 0.02; // Time step
    let F = 1.0; 
    let isRunning = false;
    
    let xc = 0; // Classical position
    let xr = 0; // Relativistic position
    let historyData = []; // Store graph points

    // --- UI ELEMENTS ---
    let forceSlider, startBtn, resetBtn;

    function setup() {
        let canvas = createCanvas(800, 500);
        canvas.parent('canvas-container');

        forceSlider = document.getElementById('forceSlider');
        startBtn = document.getElementById('startBtn');
        resetBtn = document.getElementById('resetBtn');

        forceSlider.addEventListener('input', () => {
            document.getElementById('forceDisplay').innerText = forceSlider.value;
            if (!isRunning && t === 0) F = parseFloat(forceSlider.value);
        });

        startBtn.addEventListener('click', () => {
            isRunning = !isRunning;
            startBtn.innerText = isRunning ? "Pause" : "Resume";
        });

        resetBtn.addEventListener('click', resetSim);
        resetSim();
    }

    function resetSim() {
        isRunning = false;
        startBtn.innerText = "Start Engine";
        F = parseFloat(forceSlider.value);
        t = 0;
        xc = 0;
        xr = 0;
        historyData = [];
    }

    function draw() {
        background(20, 20, 25);

        if (isRunning) {
            updatePhysics();
        }

        drawRaceTrack();
        drawGraphs();
    }

    function updatePhysics() {
        t += dt;

        // 1. CLASSICAL PHYSICS
        // v = (F/m) * t
        let vc = (F / M) * t;
        let pc = M * vc;
        xc += vc * dt * 100; // visual speed multiplier

        // 2. RELATIVISTIC PHYSICS
        // p = F * t  (Newton's 2nd Law holds for momentum!)
        // v = p / sqrt(m^2 + (p/c)^2)
        let pr = F * t;
        let vr = pr / sqrt(M*M + (pr*pr)/(C*C));
        xr += vr * dt * 100;

        // Save data for graphs
        historyData.push({ t: t, vc: vc, vr: vr, pc: pc, pr: pr });

        // Auto-pause if graph goes off screen
        if (t > 10) {
            isRunning = false;
            startBtn.innerText = "Max Time Reached";
        }
    }

    function drawRaceTrack() {
        push();
        // Track Background
        fill(30);
        noStroke();
        rect(0, 0, width, 150);
        
        // Finish line (visual loops)
        stroke(100);
        strokeWeight(2);
        for(let i = 0; i < width; i += 100) line(i, 0, i, 150);

        // Calculate visual wrapping so they loop around the screen
        let visXc = xc % width;
        let visXr = xr % width;

        // Draw Classical Ship (Red)
        fill(255, 82, 82);
        noStroke();
        rect(visXc, 25, 40, 20, 5);
        fill(255, 200, 0); // Engine flame
        if (isRunning) triangle(visXc, 25, visXc, 45, visXc - random(10,30), 35);

        // Draw Relativistic Ship (Blue)
        fill(68, 138, 255);
        noStroke();
        rect(visXr, 95, 40, 20, 5);
        fill(0, 255, 255); // Engine flame
        if (isRunning) triangle(visXr, 95, visXr, 115, visXr - random(10,30), 105);

        // Labels
        fill(255); textSize(12);
        text("Classical", visXc + 5, 20);
        text("Relativistic", visXr + 5, 90);
        pop();
        
        // Divider
        stroke(50); strokeWeight(4);
        line(0, 150, width, 150);
    }

    function drawGraphs() {
        let graphW = width / 2 - 40;
        let graphH = 250;
        let startY = 450;
        
        // --- VELOCITY GRAPH (Left) ---
        let vStartX = 30;
        drawGraphAxes(vStartX, startY, graphW, graphH, "Time", "Velocity (v)");
        
        // Draw Speed of Light line (c = 1.0)
        let cY = startY - (1.0 * 100); // Scale 1.0 to 100px
        stroke(255, 255, 0, 150);
        strokeWeight(2);
        drawingContext.setLineDash([5, 5]);
        line(vStartX, cY, vStartX + graphW, cY);
        drawingContext.setLineDash([]);
        noStroke(); fill(255, 255, 0); textSize(12);
        text("Speed of Light (c)", vStartX + 10, cY - 5);

        // Plot Velocity Data
        strokeWeight(3);
        noFill();
        
        // Classical Velocity
        stroke(255, 82, 82);
        beginShape();
        for (let d of historyData) {
            let px = vStartX + (d.t / 10) * graphW;
            let py = startY - (d.vc * 100);
            if (py > 170) vertex(px, py); // Don't draw outside graph area
        }
        endShape();

        // Relativistic Velocity
        stroke(68, 138, 255);
        beginShape();
        for (let d of historyData) {
            let px = vStartX + (d.t / 10) * graphW;
            let py = startY - (d.vr * 100);
            vertex(px, py);
        }
        endShape();

        // --- MOMENTUM GRAPH (Right) ---
        let mStartX = width / 2 + 20;
        drawGraphAxes(mStartX, startY, graphW, graphH, "Time", "Momentum (p)");

        // Plot Momentum Data
        strokeWeight(4);
        noFill();
        
        // Classical Momentum
        stroke(255, 82, 82, 150); // Semi-transparent to see overlap
        beginShape();
        for (let d of historyData) {
            let px = mStartX + (d.t / 10) * graphW;
            let py = startY - (d.pc * 20); // Scale momentum down to fit
            if (py > 170) vertex(px, py);
        }
        endShape();

        // Relativistic Momentum
        stroke(68, 138, 255);
        strokeWeight(2); // Thinner line drawn on top to show perfect overlap
        beginShape();
        for (let d of historyData) {
            let px = mStartX + (d.t / 10) * graphW;
            let py = startY - (d.pr * 20);
            if (py > 170) vertex(px, py);
        }
        endShape();
    }

    function drawGraphAxes(x, y, w, h, xLabel, yLabel) {
        push();
        stroke(150);
        strokeWeight(2);
        line(x, y, x + w, y); // X axis
        line(x, y, x, y - h); // Y axis
        
        noStroke();
        fill(200);
        textSize(14);
        textAlign(CENTER, TOP);
        text(xLabel, x + w / 2, y + 10);
        
        textAlign(CENTER, BOTTOM);
        push();
        translate(x - 10, y - h / 2);
        rotate(-PI / 2);
        text(yLabel, 0, 0);
        pop();
        pop();
    }
</script>
</body>
</html>

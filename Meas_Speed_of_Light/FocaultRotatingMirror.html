<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foucault's Experiment - Final Lab Setup</title>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
        #renderCanvas { width: 100vw; height: 100vh; touch-action: none; outline: none; }
        
        #uiContainer {
            position: absolute; top: 10px; left: 10px; background: rgba(30, 30, 40, 0.95);
            padding: 20px; border-radius: 10px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 10; color: white;
            min-width: 250px;
            transform: scale(0.75); 
            transform-origin: top left;
        }
        h2 { margin-top: 0; font-size: 1.2rem; color: #4DA8DA; }
        .control-group { margin-top: 15px; }
        input[type=range] { width: 100%; cursor: pointer; }

        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle { 
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #555; transition: .3s; border-radius: 24px; 
        }
        .slider-toggle:before { 
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; 
            background-color: white; transition: .3s; border-radius: 50%; 
        }
        
        /* Laser Switch Colors */
        #laserToggle:checked + .slider-toggle { background-color: #f00; } 
        #laserToggle:checked + .slider-toggle:before { transform: translateX(22px); }
        
        /* Motor Switch Colors */
        #motorToggle:checked + .slider-toggle { background-color: #0f0; } 
        #motorToggle:checked + .slider-toggle:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div id="uiContainer">
        <h2>Foucault's Rotating Mirror Experiment</h2>
        
        <div class="switch-container">
            <label style="font-weight: bold; color: #aaa;">Laser Power</label>
            <label class="switch">
              <input type="checkbox" id="laserToggle" checked>
              <span class="slider-toggle"></span>
            </label>
        </div>
        
        <div class="switch-container">
            <label style="font-weight: bold; color: #aaa;">Motor Power</label>
            <label class="switch">
              <input type="checkbox" id="motorToggle">
              <span class="slider-toggle"></span>
            </label>
        </div>

        <div class="control-group">
            <label>Mirror Frequency: <span id="hzValue">0</span> Hz</label><br>
            <input type="range" id="hzSlider" min="0" max="800" value="0">
        </div>

        <div class="control-group">
            <label>Mirror Thickness: <span id="thickValue">1.0</span>x</label><br>
            <input type="range" id="thickSlider" min="0.5" max="5.0" step="0.1" value="1.0">
        </div>
        
        <hr style="border-color: #444; margin: 15px 0;">
        
        <p style="color: #4DA8DA; margin-bottom: 5px;"><b>Microscope Reading</b></p>
        <p style="font-size: 0.85rem; margin: 3px 0; color: #ccc;">Fixed Mirror Dist (D): 15.01 m</p>
        <p style="font-size: 0.85rem; margin: 3px 0; color: #ccc;">Return Path (r): 5.12 m</p>
        <p style="font-size: 1rem; margin: 8px 0;">Displacement (Δx): <br><b><span id="sValue" style="color:#0f0;">0.0000</span> mm</b></p>
        
        <hr style="border-color: #444; margin: 15px 0;">
        
        <p style="font-size: 0.85rem; margin: 3px 0; color: #ccc;">Formula: c = (4 * r * D * ω) / Δx</p>
        <p style="font-size: 1.1rem; margin: 8px 0;">Speed of Light (c): <br><b><span id="cValue" style="color: #ffcc00;">0</span> m/s</b></p>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true); 

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color4(0.4, 0.5, 0.6, 1); 

            const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2.5, Math.PI / 3.5, 35, new BABYLON.Vector3(-6, 0, -2), scene);
            camera.attachControl(canvas, true); 

            const hemisphericLight = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            hemisphericLight.intensity = 0.9;

            const spotLight = new BABYLON.SpotLight("spotLight", new BABYLON.Vector3(-5, 25, -5), new BABYLON.Vector3(0, -1, 0), Math.PI / 2, 2, scene);
            spotLight.intensity = 0.4;

            const gl = new BABYLON.GlowLayer("glow", scene);
            gl.intensity = 1.0;

            // --- MATERIALS ---
            const metalMat = new BABYLON.StandardMaterial("metal", scene);
            metalMat.diffuseColor = new BABYLON.Color3(0.2, 0.2, 0.2);
            metalMat.specularPower = 32; 
            
            const darkMetalMat = new BABYLON.StandardMaterial("darkMetal", scene);
            darkMetalMat.diffuseColor = new BABYLON.Color3(0.05, 0.05, 0.08);
            darkMetalMat.specularPower = 64;

            const mirrorMat = new BABYLON.StandardMaterial("mirrorMat", scene);
            mirrorMat.diffuseColor = new BABYLON.Color3(0.85, 0.9, 0.95);  
            mirrorMat.specularColor = new BABYLON.Color3(1, 1, 1);     

            const glassMat = new BABYLON.StandardMaterial("glassMat", scene);
            glassMat.diffuseColor = new BABYLON.Color3(0.6, 0.8, 1.0);
            glassMat.alpha = 0.4; 
            glassMat.specularPower = 128;

            const frostedMat = new BABYLON.StandardMaterial("frostedMat", scene);
            frostedMat.diffuseColor = new BABYLON.Color3(0.9, 0.9, 0.95);
            frostedMat.alpha = 0.85;

            const laserMat = new BABYLON.StandardMaterial("laserMat", scene);
            laserMat.emissiveColor = new BABYLON.Color3(1, 0, 0); 
            laserMat.disableLighting = true;
            
            // NEW: Reference Beam Material (Slightly dimmer yellow)
            const refLaserMat = new BABYLON.StandardMaterial("refLaserMat", scene);
            refLaserMat.emissiveColor = new BABYLON.Color3(1, 0.8, 0); 
            refLaserMat.disableLighting = true;
            refLaserMat.alpha = 0.5;

            // --- BUILD THE V-SHAPED LAYOUT ---
            const DISTANCE = 15; 
            
            const centerMirror = BABYLON.MeshBuilder.CreateBox("centerMirror", {width: 2, height: 3, depth: 0.2}, scene);
            centerMirror.position = BABYLON.Vector3.Zero();
            centerMirror.material = mirrorMat;

            const distantMirror = BABYLON.MeshBuilder.CreateBox("distantMirror", {width: 0.5, height: 4, depth: 3}, scene);
            distantMirror.position = new BABYLON.Vector3(-DISTANCE, 0, 0);
            distantMirror.material = mirrorMat;

            const lens = BABYLON.MeshBuilder.CreateCylinder("lens", {height: 0.2, diameter: 2.5}, scene);
            lens.position = new BABYLON.Vector3(-7.5, 0, 0);
            lens.rotation.z = Math.PI / 2;
            lens.material = glassMat;

            const laserDist = 12;
            const laserAngle = Math.atan2(-7, -10); 
            const laserX = -10;
            const laserZ = -7;
            
            const laserBody = BABYLON.MeshBuilder.CreateCylinder("laser", {height: 3, diameter: 0.8}, scene);
            laserBody.rotation.x = Math.PI / 2;
            laserBody.bakeCurrentTransformIntoVertices();
            laserBody.position = new BABYLON.Vector3(laserX, 0, laserZ);
            laserBody.lookAt(BABYLON.Vector3.Zero()); 
            laserBody.material = metalMat;

            const bsX = laserX * 0.4;
            const bsZ = laserZ * 0.4;
            const beamSplitter = BABYLON.MeshBuilder.CreateBox("beamSplitter", {width: 2.5, height: 2.5, depth: 0.1}, scene);
            beamSplitter.position = new BABYLON.Vector3(bsX, 0, bsZ);
            beamSplitter.lookAt(BABYLON.Vector3.Zero()); 
            beamSplitter.rotate(BABYLON.Axis.Y, Math.PI / 4, BABYLON.Space.LOCAL); 
            beamSplitter.material = glassMat;

            const screenDist = 4;
            const screenAngle = laserAngle + Math.PI / 2; 
            const screenX = bsX + screenDist * Math.cos(screenAngle);
            const screenZ = bsZ + screenDist * Math.sin(screenAngle);
            
            const screenPlane = BABYLON.MeshBuilder.CreatePlane("screenPlane", {width: 4, height: 4}, scene);
            screenPlane.position = new BABYLON.Vector3(screenX, 0, screenZ);
            screenPlane.lookAt(new BABYLON.Vector3(bsX, 0, bsZ)); 
            screenPlane.material = frostedMat;

            const microDist = screenDist + 1.5; 
            const microX = bsX + microDist * Math.cos(screenAngle);
            const microZ = bsZ + microDist * Math.sin(screenAngle);

            const microStand = BABYLON.MeshBuilder.CreateBox("microStand", {width: 1, height: 1.5, depth: 1}, scene);
            microStand.position = new BABYLON.Vector3(microX, -0.75, microZ);
            microStand.material = darkMetalMat;

            const microTube = BABYLON.MeshBuilder.CreateCylinder("microTube", {height: 2, diameter: 0.4}, scene);
            microTube.rotation.x = Math.PI / 2;
            microTube.bakeCurrentTransformIntoVertices();
            microTube.position = new BABYLON.Vector3(microX, 0.2, microZ);
            microTube.lookAt(new BABYLON.Vector3(screenX, 0.2, screenZ)); 
            microTube.material = darkMetalMat;

            const centerTable = BABYLON.MeshBuilder.CreateBox("centerTable", {width: 3, height: 2, depth: 3}, scene);
            centerTable.position.y = -1.5;
            centerTable.material = metalMat;

            const distantTable = BABYLON.MeshBuilder.CreateBox("distantTable", {width: 2, height: 2, depth: 4}, scene);
            distantTable.position.x = -DISTANCE;
            distantTable.position.y = -1.5;
            distantTable.material = metalMat;
            
            // --- MARKERS ---
            // 1. Measurement Marker (Green - Moves with Frequency)
            const markerMat = new BABYLON.StandardMaterial("markerMat", scene);
            markerMat.emissiveColor = new BABYLON.Color3(0, 1, 0); 
            markerMat.disableLighting = true;
            const marker = BABYLON.MeshBuilder.CreateSphere("marker", {diameter: 0.25}, scene);
            marker.material = markerMat;
            
            // 2. NEW: Reference Marker (Yellow - Stationary Baseline)
            const refMarkerMat = new BABYLON.StandardMaterial("refMarkerMat", scene);
            refMarkerMat.emissiveColor = new BABYLON.Color3(1, 0.8, 0); 
            refMarkerMat.disableLighting = true;
            const refMarker = BABYLON.MeshBuilder.CreateSphere("refMarker", {diameter: 0.20}, scene);
            refMarker.position = new BABYLON.Vector3(screenX, 0.1, screenZ);
            refMarker.material = refMarkerMat;

            // --- UI VARIABLES & LISTENERS ---
            let currentHz = 0;
            let centerMirrorAngle = 0; 
            
            let incomingTube, sweepTube, returnTube, referenceTube; 
            
            let isLaserOn = true; 
            let isMotorOn = false; // Start with motor off so the baseline is clear!

            // Exact angle to perfectly align the mirror to the fixed mirror
            const I_in = new BABYLON.Vector3(-laserX, 0, -laserZ).normalize();
            const R_out = new BABYLON.Vector3(-1, 0, 0);
            const N_ideal = I_in.subtract(R_out).normalize();
            const ALIGN_ANGLE = Math.atan2(N_ideal.x, N_ideal.z);

            document.getElementById('hzSlider').addEventListener('input', function(e) {
                currentHz = parseFloat(e.target.value);
                document.getElementById('hzValue').innerText = currentHz;
            });

            document.getElementById('laserToggle').addEventListener('change', function(e) {
                isLaserOn = e.target.checked;
            });
            
            document.getElementById('motorToggle').addEventListener('change', function(e) {
                isMotorOn = e.target.checked;
            });

            document.getElementById('thickSlider').addEventListener('input', function(e) {
                let thicknessScale = parseFloat(e.target.value);
                document.getElementById('thickValue').innerText = thicknessScale.toFixed(1);
                centerMirror.scaling.z = thicknessScale;
                distantMirror.scaling.x = thicknessScale;
            });

            // --- THE RENDER LOOP ---
            scene.onBeforeRenderObservable.add(() => {
                const dt = engine.getDeltaTime() / 1000; 
                
                // Determine the active frequency. If motor is off, frequency is effectively 0!
                let activeHz = isMotorOn ? currentHz : 0;

                // --- 1. REAL WORLD MATH (For UI calculations only) ---
                const omega = activeHz * 2 * Math.PI;
                const TRUE_C = 299792458; 
                const REAL_D = 15.01; 
                const REAL_r = 5.12;  

                const realDisplacementMeters = (4 * REAL_r * REAL_D * omega) / TRUE_C;
                const s_mm = realDisplacementMeters * 1000; 

                let calculatedC = 0;
                if (realDisplacementMeters > 0) {
                    calculatedC = (4 * REAL_r * REAL_D * omega) / realDisplacementMeters;
                }

                // If laser is off, clear UI and hide ALL visual light
                if (!isLaserOn) {
                    document.getElementById('sValue').innerText = "0.0000";
                    document.getElementById('cValue').innerText = "0";
                    marker.isVisible = false;
                    refMarker.isVisible = false;
                    if (incomingTube) incomingTube.isVisible = false;
                    if (sweepTube) sweepTube.isVisible = false;
                    if (returnTube) returnTube.isVisible = false;
                    if (referenceTube) referenceTube.isVisible = false;
                    return; 
                }

                // Update UI numbers
                document.getElementById('sValue').innerText = s_mm.toFixed(4);
                if (activeHz === 0) {
                    document.getElementById('cValue').innerText = "0";
                } else {
                    document.getElementById('cValue').innerText = calculatedC.toLocaleString(undefined, {maximumFractionDigits: 0});
                }

                // --- 2. VISUAL MATH & 3D RENDERING ---
                
                // If the motor is off, snap to perfectly aligned baseline. Else, spin smoothly.
                if (!isMotorOn || currentHz === 0) {
                    centerMirrorAngle = ALIGN_ANGLE;
                } else {
                    let visualOmega = 5; 
                    centerMirrorAngle += visualOmega * dt;
                }
                centerMirror.rotation.y = centerMirrorAngle;

                // DRAW INCIDENT BEAM (Laser to Origin)
                const incomingPoints = [
                    new BABYLON.Vector3(laserX, 0.1, laserZ),  
                    new BABYLON.Vector3(bsX, 0.1, bsZ),        
                    new BABYLON.Vector3(0, 0.1, 0)
                ];
                if (!incomingTube) {
                    incomingTube = BABYLON.MeshBuilder.CreateTube("inTube", {path: incomingPoints, radius: 0.05, updatable: true}, scene);
                    incomingTube.material = laserMat;
                } else {
                    incomingTube.isVisible = true;
                }
                
                // NEW: DRAW REFERENCE BEAM (Initial split from BS to Screen)
                const referencePoints = [
                    new BABYLON.Vector3(bsX, 0.1, bsZ),
                    new BABYLON.Vector3(screenX, 0.1, screenZ)
                ];
                if (!referenceTube) {
                    referenceTube = BABYLON.MeshBuilder.CreateTube("refTube", {path: referencePoints, radius: 0.03, updatable: true}, scene);
                    referenceTube.material = refLaserMat; // Use the dimmer yellow material
                } else {
                    referenceTube.isVisible = true;
                }
                refMarker.isVisible = true;

                // CALCULATE SWEEPING BEAM (Origin to Walls)
                const mirrorNormal = new BABYLON.Vector3(Math.sin(centerMirrorAngle), 0, Math.cos(centerMirrorAngle));
                const incidentRay = new BABYLON.Vector3(-laserX, 0, -laserZ).normalize(); 
                const dot = BABYLON.Vector3.Dot(incidentRay, mirrorNormal);
                const reflectedRay = incidentRay.subtract(mirrorNormal.scale(2 * dot)).normalize();

                const sweepPoints = [
                    new BABYLON.Vector3(0, 0.1, 0),
                    new BABYLON.Vector3(reflectedRay.x * DISTANCE, 0.1, reflectedRay.z * DISTANCE)
                ];

                if (!sweepTube) {
                    sweepTube = BABYLON.MeshBuilder.CreateTube("sweepTube", {path: sweepPoints, radius: 0.05, updatable: true}, scene);
                    sweepTube.material = laserMat;
                } else {
                    sweepTube.isVisible = true;
                    sweepTube = BABYLON.MeshBuilder.CreateTube("sweepTube", {path: sweepPoints, radius: 0.05, instance: sweepTube});
                }

                // Cap visual deflection 
                const maxVisualDeflectionAngle = 0.15; 
                const visualDeflectionAngle = (activeHz / 800) * maxVisualDeflectionAngle;

                let rx = bsX * Math.cos(visualDeflectionAngle) - bsZ * Math.sin(visualDeflectionAngle);
                let rz = bsX * Math.sin(visualDeflectionAngle) + bsZ * Math.cos(visualDeflectionAngle);
                
                let finalScreenAngle = screenAngle + visualDeflectionAngle;
                let sx = rx + screenDist * Math.cos(finalScreenAngle);
                let sz = rz + screenDist * Math.sin(finalScreenAngle);

                // Update Green Measurement Marker
                marker.isVisible = true;
                marker.position = new BABYLON.Vector3(sx, 0.1, sz);

                // Draw return path if aligned
                const isAligned = reflectedRay.x < -0.99; 

                if (isAligned) {
                    const returnPoints = [
                        new BABYLON.Vector3(-DISTANCE, 0.1, 0),    
                        new BABYLON.Vector3(0, 0.1, 0),            
                        new BABYLON.Vector3(rx, 0.1, rz),         
                        new BABYLON.Vector3(sx, 0.1, sz)          
                    ];

                    if (!returnTube) {
                        returnTube = BABYLON.MeshBuilder.CreateTube("returnTube", {path: returnPoints, radius: 0.05, updatable: true}, scene);
                        returnTube.material = laserMat;
                    } else {
                        returnTube.isVisible = true; 
                        returnTube = BABYLON.MeshBuilder.CreateTube("returnTube", {path: returnPoints, radius: 0.05, instance: returnTube});
                    }
                } else {
                    if (returnTube) returnTube.isVisible = false; 
                }
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
